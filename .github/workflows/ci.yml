name: CI — Lint, Test, Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ═══════════════════════════════════════════════════════════
  #  BACKEND: Python linting, import check, tests, security
  # ═══════════════════════════════════════════════════════════
  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.server.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.server.txt
          pip install ruff bandit pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Import verification
        run: python3 -c "import models; import server; print('Import OK')"

      - name: Run tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found — skipping"
          fi

      - name: Security scan with bandit
        run: bandit -r routers/ services/ server.py models.py -ll --quiet

  # ═══════════════════════════════════════════════════════════
  #  FRONTEND: TypeScript check + Next.js build
  # ═══════════════════════════════════════════════════════════
  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v3
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Next.js build
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
