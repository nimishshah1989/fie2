name: Deploy to JSL Wealth Server

on:
  push:
    branches: [main]

env:
  EC2_HOST: 13.206.34.214

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.JSL_EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            cd /home/ubuntu/fie2
            git pull origin main
            sudo docker build --platform linux/amd64 -t fie2:latest .
            sudo docker stop fie2 || true
            sudo docker rm fie2 || true
            sudo docker run -d --name fie2 --restart always -p 8004:8000 --env-file /home/ubuntu/fie2.env fie2:latest
            sudo docker image prune -f
