[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # line length handled by line-length setting above

[tool.ruff.lint.isort]
known-first-party = ["models", "price_service", "routers", "services", "middleware"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
